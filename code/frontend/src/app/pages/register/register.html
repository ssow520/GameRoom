<div class="register-container">
  <div class="register-card">
    <a routerLink="/" class="back-link">← Accueil</a>
    <h1>GameRoom</h1>
    <h2>Inscription</h2>

    <div class="error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="votre pseudo"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="votre@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <div class="form-group">
        <label for="avatar">Avatar (optionnel)</label>
        <input
          type="text"
          id="avatar"
          [(ngModel)]="avatar"
          name="avatar"
          placeholder="URL de votre avatar"
        />
      </div>

      <button type="submit">S'inscrire</button>
    </form>

    <p class="redirect">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
